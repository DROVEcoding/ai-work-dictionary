<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI 学习词典</title>
  <meta name="theme-color" content="#0f766e">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-shell">
    <section class="hero">
      <div>
        <p class="eyebrow">GitHub + AI Coding</p>
        <h1>AI 学习词典</h1>
        <p class="intro">把 GitHub、CLI、Skill、Vibe Coding 等新词整理成能搜索、能筛选的学习卡片。</p>
      </div>
      <div class="summary-card" aria-label="词典统计">
        <span class="summary-number" id="termCount">0</span>
        <span class="summary-label">个入门词汇</span>
      </div>
    </section>

    <section class="auth-panel" aria-label="本地模拟登录">
      <div>
        <p class="eyebrow">Local Account Demo</p>
        <h2>本地学习账号</h2>
        <p class="auth-copy">V6A 用本地模拟登录学习账号概念：它不会连接服务器，也不适合作为真实密码系统。</p>
      </div>
      <form class="auth-form" id="loginForm">
        <label>
          <span>用户名</span>
          <input id="usernameInput" type="text" autocomplete="username" placeholder="例如：DROVE">
        </label>
        <button class="primary-button" type="submit">进入</button>
      </form>
      <div class="auth-session" id="authSession" hidden>
        <span id="userDisplay"></span>
        <button class="secondary-button" id="logoutButton" type="button">退出</button>
      </div>
      <p class="form-message" id="loginMessage" hidden></p>
    </section>

    <section class="manager-panel" aria-label="新增词条">
      <div class="section-heading">
        <div>
          <p class="eyebrow">Manage Terms</p>
          <h2 id="formTitle">新增学习词条</h2>
          <p class="edit-hint" id="editHint" hidden>正在编辑已有词条，保存后会更新原卡片。</p>
        </div>
        <button class="reset-button" id="resetButton" type="button">重置默认词库</button>
      </div>

      <form class="term-form" id="termForm">
        <label>
          <span>词条名称</span>
          <input id="termInput" type="text" placeholder="例如：localStorage">
        </label>
        <label>
          <span>分类</span>
          <select id="categoryInput">
            <option value="github">GitHub / Git</option>
            <option value="ai">AI 编程</option>
            <option value="process">项目流程</option>
          </select>
        </label>
        <label class="wide-field">
          <span>解释</span>
          <textarea id="definitionInput" rows="3" placeholder="用新手能懂的话解释这个词"></textarea>
        </label>
        <label class="wide-field">
          <span>解决的问题</span>
          <textarea id="solvesInput" rows="3" placeholder="说明这个词是为了解决什么问题而存在"></textarea>
        </label>
        <div class="form-actions">
          <button class="primary-button" id="submitButton" type="submit">新增词条</button>
          <button class="secondary-button" id="cancelEditButton" type="button" hidden>取消编辑</button>
        </div>
        <p class="form-message" id="formMessage" hidden></p>
      </form>
    </section>

    <section class="backup-panel" aria-label="备份和离线使用">
      <div>
        <p class="eyebrow">Portable App</p>
        <h2>备份与离线使用</h2>
        <p class="backup-copy">导出备份可以保存你的词条；导入备份可以在另一台电脑或浏览器里恢复。</p>
      </div>
      <div class="backup-actions">
        <button class="secondary-button" id="exportButton" type="button">导出备份</button>
        <label class="import-label">
          <span>导入备份</span>
          <input id="importInput" type="file" accept="application/json,.json">
        </label>
      </div>
      <p class="form-message" id="backupMessage" hidden></p>
    </section>

    <section class="toolbar" aria-label="词典工具">
      <label class="search-label" for="searchInput">搜索词汇</label>
      <input id="searchInput" class="search-input" type="search" placeholder="例如：CLI、Commit、分支">

      <div class="filter-group" aria-label="分类筛选">
        <button class="filter-button active" type="button" data-category="all">全部</button>
        <button class="filter-button" type="button" data-category="github">GitHub / Git</button>
        <button class="filter-button" type="button" data-category="ai">AI 编程</button>
        <button class="filter-button" type="button" data-category="process">项目流程</button>
      </div>

      <div class="filter-group" aria-label="学习状态筛选">
        <button class="filter-button active" type="button" data-status="all">全部状态</button>
        <button class="filter-button" type="button" data-status="unknown">不会</button>
        <button class="filter-button" type="button" data-status="learning">在学</button>
        <button class="filter-button" type="button" data-status="known">已会</button>
      </div>
    </section>

    <section class="dictionary-grid" id="dictionaryGrid" aria-live="polite"></section>
    <p class="empty-state" id="emptyState" hidden>没有找到匹配的词。换个关键词试试。</p>
  </main>

  <script type="module" src="scripts/app.js"></script>
</body>
</html>
