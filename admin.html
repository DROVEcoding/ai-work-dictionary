<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>超级管理员后台 - AI 工作字典</title>
  <meta name="theme-color" content="#0f766e">
  <link rel="manifest" href="manifest.json">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <main class="page-shell admin-shell">
    <section class="admin-hero">
      <div>
        <p class="eyebrow">Super Admin Console</p>
        <h1>超级管理员后台</h1>
        <p class="intro">查看平台用户、组织、成员关系和用户反馈。</p>
      </div>
      <div class="admin-hero-actions">
        <span id="adminIdentityLabel">正在检查身份...</span>
        <button class="secondary-button" id="adminRefreshButton" type="button" hidden>刷新后台数据</button>
        <a class="secondary-button" href="./index.html">返回词典</a>
      </div>
    </section>

    <section class="admin-gate" id="adminGate" aria-live="polite"></section>

    <section class="admin-console" id="adminContent" hidden>
      <section class="admin-overview-grid" id="adminOverview" aria-label="平台总览"></section>

      <section class="admin-filter-panel" aria-label="后台搜索和筛选">
        <label>
          <span>搜索</span>
          <input id="adminSearchInput" type="search" placeholder="搜索用户邮箱、组织名、反馈内容">
        </label>
        <label>
          <span>反馈状态</span>
          <select id="adminFeedbackStatusFilter">
            <option value="all">全部</option>
            <option value="open">open</option>
            <option value="triaged">triaged</option>
            <option value="resolved">resolved</option>
          </select>
        </label>
      </section>

      <section class="admin-panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Users</p>
            <h2>用户</h2>
          </div>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table" aria-label="用户列表">
            <thead>
              <tr>
                <th>邮箱</th>
                <th>平台角色</th>
                <th>加入组织数</th>
                <th>创建时间</th>
              </tr>
            </thead>
            <tbody id="adminUsers"></tbody>
          </table>
        </div>
      </section>

      <section class="admin-panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Organizations</p>
            <h2>组织</h2>
          </div>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table" aria-label="组织列表">
            <thead>
              <tr>
                <th>组织</th>
                <th>拥有者</th>
                <th>成员数</th>
                <th>创建时间</th>
                <th>操作</th>
              </tr>
            </thead>
            <tbody id="adminOrganizations"></tbody>
          </table>
        </div>
      </section>

      <section class="admin-panel" id="adminOrganizationDetailPanel" hidden>
        <div class="section-heading">
          <div>
            <p class="eyebrow">Organization Detail</p>
            <h2 id="adminOrganizationDetailTitle">组织详情</h2>
          </div>
        </div>
        <div class="admin-detail-grid" id="adminOrganizationDetail"></div>
      </section>

      <section class="admin-panel">
        <div class="section-heading">
          <div>
            <p class="eyebrow">Feedback</p>
            <h2>反馈</h2>
          </div>
        </div>
        <div class="admin-table-wrap">
          <table class="admin-table" aria-label="反馈列表">
            <thead>
              <tr>
                <th>反馈</th>
                <th>提交人</th>
                <th>组织</th>
                <th>状态</th>
                <th>提交时间</th>
              </tr>
            </thead>
            <tbody id="adminFeedback"></tbody>
          </table>
        </div>
      </section>
    </section>
  </main>

  <script type="module" src="scripts/admin.js"></script>
</body>
</html>
